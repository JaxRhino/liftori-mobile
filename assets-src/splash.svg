<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" width="1284" height="2778">
  <!--
    Launch splash — same three rising bars, centered vertically just above the
    midline, with the "Liftori" wordmark and "Lift Your Idea." tagline.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1284" height="2778" fill="url(#bg)"/>
  <rect width="1284" height="2778" fill="url(#glow)"/>

  <!-- logo mark group, centered on x, nudged above vertical center -->
  <g transform="translate(430 1140)">
    <rect x="0" y="220" width="100" height="160" rx="26" fill="url(#bar)" opacity="0.55"/>
    <rect x="156" y="120" width="100" height="260" rx="26" fill="url(#bar)" opacity="0.82"/>
    <rect x="312" y="0" width="100" height="380" rx="26" fill="url(#bar)"/>
    <rect x="0" y="404" width="412" height="8" rx="4" fill="#10b981" opacity="0.55"/>
  </g>

  <!-- wordmark -->
  <text x="642" y="1750"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif"
        font-size="120"
        font-weight="800"
        fill="#f1f5f9"
        text-anchor="middle"
        letter-spacing="-2">Liftori</text>

  <!-- tagline -->
  <text x="642" y="1830"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif"
        font-size="44"
        font-weight="500"
        fill="#94a3b8"
        text-anchor="middle"
        letter-spacing="2">Lift Your Idea.</text>
</svg>
