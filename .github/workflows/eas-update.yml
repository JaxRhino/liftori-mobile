name: EAS Update (OTA)

# Fires on every push to main/master. Publishes a new JS bundle to Expo's
# update server — installed apps on the `preview` channel pick it up on
# their next cold start (or when the in-app UpdatesBoundary polls).
#
# Does NOT rebuild the native APK. Use `eas-build.yml` (manual) for that.
#
# Skip conditions: if the commit message contains [skip update], the job
# bails out — useful for docs-only pushes.
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel to publish to'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
          - development
      message:
        description: 'Update message (defaults to commit message)'
        required: false
        type: string

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip update]')"
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN secret is missing. Add it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Resolve channel
        id: channel
        run: |
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            echo "value=${{ github.event.inputs.channel }}" >> $GITHUB_OUTPUT
          else
            echo "value=preview" >> $GITHUB_OUTPUT
          fi

      - name: Resolve update message
        id: message
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          INPUT_MSG: ${{ github.event.inputs.message }}
        run: |
          if [ -n "$INPUT_MSG" ]; then
            MSG="$INPUT_MSG"
          elif [ -n "$COMMIT_MSG" ]; then
            MSG="$(echo "$COMMIT_MSG" | head -1 | cut -c1-250)"
          else
            MSG="Manual OTA update"
          fi
          # Single-quote for safety in the shell arg below
          echo "value=$MSG" >> $GITHUB_OUTPUT

      - name: Publish EAS Update
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://qlerfkdyslndjbaltkwo.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZXJma2R5c2xuZGpiYWx0a3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTc0MTAsImV4cCI6MjA4ODczMzQxMH0.NM-bFnfWqrnelLnpYO8NNMVpwkoq4LSfCIVq6gs23qk
        run: |
          eas update \
            --channel "${{ steps.channel.outputs.value }}" \
            --message "${{ steps.message.outputs.value }}" \
            --non-interactive

      - name: Summarize
        run: |
          echo "OTA update published to channel: ${{ steps.channel.outputs.value }}"
          echo "Installed apps will pick it up on next cold start (or when the in-app updater polls)."
          echo "Track updates: https://expo.dev/accounts/rhinomarch/projects/liftori-mobile/updates"
